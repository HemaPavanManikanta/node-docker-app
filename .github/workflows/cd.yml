name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t YOUR_DOCKER_USERNAME/node-docker-app:latest .

    - name: Build Successful
      run: echo "Docker Image built successfully"

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Login Successful
      run: echo "Logged in to Docker Hub successfully"

    - name: Push the Docker Image
      run: docker push YOUR_DOCKER_USERNAME/node-docker-app:latest